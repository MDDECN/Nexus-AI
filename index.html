<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI | Multimodal Creative Studio</title>
    
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2103/2103633.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #09090b;
            --sidebar-bg: #111113;
            --accent-primary: #a855f7;
            --accent-secondary: #ec4899;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --border-color: #27272a;
            --card-bg: #18181b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 280px;
            background-color: var(--sidebar-bg);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 3rem;
            letter-spacing: -1px;
        }

        .menu-section {
            margin-bottom: 2rem;
        }

        .menu-label {
            font-size: 0.7rem;
            color: #52525b;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 1rem;
            display: block;
            letter-spacing: 1px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 10px;
            margin-bottom: 0.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: 1px solid transparent;
            background: transparent;
            width: 100%;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .menu-item:hover {
            background-color: #1e1e22;
            color: #ffffff;
        }

        .menu-item.active {
            background-color: #27272a;
            color: #ffffff;
            border-color: var(--border-color);
        }

        .menu-item .icon {
            margin-right: 12px;
            font-size: 1.1rem;
        }

        .btn-clear {
            margin-top: auto;
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .btn-clear:hover {
            background: #450a0a;
            border-color: #ef4444;
            color: #fecaca;
        }

        .main-content {
            flex: 1;
            padding: 3rem;
            overflow-y: auto;
            background: radial-gradient(circle at 70% 0%, #1e1b4b 0%, #09090b 50%);
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
        }

        .prompt-box {
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 3rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        textarea {
            width: 100%;
            height: 80px;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1.1rem;
            resize: none;
            outline: none;
            line-height: 1.5;
        }

        .prompt-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border-color);
            padding-top: 1.2rem;
            margin-top: 1rem;
        }

        .controls {
            display: flex;
            gap: 12px;
        }

        select {
            background-color: #27272a;
            color: white;
            border: 1px solid var(--border-color);
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            outline: none;
        }

        .btn-magic {
            background: linear-gradient(135deg, #9333ea 0%, #db2777 100%);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
        }

        .btn-magic:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(168, 85, 247, 0.4);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: scale(1.02);
        }

        .card-media {
            aspect-ratio: 16/10;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-bottom: 1px solid var(--border-color);
        }

        .card-media img, .card-media video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-content {
            padding: 1.2rem;
        }

        .tag {
            font-size: 0.65rem;
            font-weight: 800;
            color: var(--accent-primary);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            display: block;
            margin-bottom: 8px;
        }

        .card-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .loader {
            width: 35px;
            height: 35px;
            border: 3px solid #27272a;
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        audio {
            width: 100%;
            height: 36px;
            margin-top: 10px;
            filter: invert(100%) hue-rotate(180deg) brightness(1.5);
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border-color); }
            .main-content { padding: 1.5rem; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">NEXUS AI</div>
        
        <nav class="menu-section">
            <span class="menu-label">Creative Engine</span>
            <button class="menu-item active" onclick="setMode('image', this)">
                <span class="icon">🖼️</span> Image Studio
            </button>
            <button class="menu-item" onclick="setMode('video', this)">
                <span class="icon">🎬</span> Video Motion
            </button>
            <button class="menu-item" onclick="setMode('audio', this)">
                <span class="icon">🎤</span> Voice & Audio
            </button>
        </nav>

        <button class="btn-clear" id="clearBtn">Clear Session</button>
    </aside>

    <main class="main-content">
        <header>
            <h1 id="mainTitle">AI Image Studio</h1>
            <p class="subtitle">Transform text into high-fidelity visual assets.</p>
        </header>

        <div class="prompt-box">
            <textarea id="promptInput" placeholder="Describe your vision in detail..."></textarea>
            <div class="prompt-footer">
                <div class="controls">
                    <select id="aspectRatio">
                        <option value="1024/1024">Square (1:1)</option>
                        <option value="1280/720">Cinema (16:9)</option>
                        <option value="720/1280">Mobile (9:16)</option>
                    </select>
                </div>
                <button class="btn-magic" id="generateBtn">Generate Result</button>
            </div>
        </div>

        <div class="gallery" id="galleryGrid"></div>
    </main>

    <script>
        let currentMode = 'image';
        const galleryGrid = document.getElementById('galleryGrid');
        const promptInput = document.getElementById('promptInput');
        const generateBtn = document.getElementById('generateBtn');

        function setMode(mode, element) {
            currentMode = mode;
            document.querySelectorAll('.menu-item').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            
            const config = {
                image: { title: "AI Image Studio", sub: "Transform text into high-fidelity visual assets." },
                video: { title: "AI Video Motion", sub: "Generate cinematic motion from descriptive prompts." },
                audio: { title: "AI Voice & Audio", sub: "Convert written text into natural neural speech." }
            };

            document.getElementById('mainTitle').innerText = config[mode].title;
            document.querySelector('.subtitle').innerText = config[mode].sub;
            promptInput.placeholder = `Describe your ${mode} content...`;
        }

        generateBtn.addEventListener('click', () => {
            const prompt = promptInput.value.trim();
            if (!prompt) return;

            const id = Date.now();
            const [width, height] = document.getElementById('aspectRatio').value.split('/');

            const card = document.createElement('div');
            card.className = 'card';
            card.id = `card-${id}`;
            card.innerHTML = `
                <div class="card-media"><div class="loader"></div></div>
                <div class="card-content">
                    <span class="tag">${currentMode} Synthesis</span>
                    <p class="card-desc">${prompt}</p>
                </div>
            `;
            galleryGrid.prepend(card);

            if (currentMode === 'image') generateImage(prompt, width, height, id);
            else if (currentMode === 'video') generateVideo(prompt, id);
            else generateAudio(prompt, id);
            
            promptInput.value = '';
        });

        function generateImage(prompt, w, h, id) {
            const seed = Math.floor(Math.random() * 999999);
            const url = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=${w}&height=${h}&seed=${seed}&nologo=true`;
            
            const img = new Image();
            img.src = url;
            img.onload = () => {
                const container = document.querySelector(`#card-${id} .card-media`);
                if (container) container.innerHTML = `<img src="${url}" alt="AI Result">`;
            };
        }

        function generateVideo(prompt, id) {
            const url = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=600&height=400&model=turbo&feed=true`;
            setTimeout(() => {
                const container = document.querySelector(`#card-${id} .card-media`);
                if (container) {
                    container.innerHTML = `
                        <img src="${url}" alt="Video Preview">
                        <div style="position:absolute; top:12px; right:12px; background:#a855f7; padding:4px 8px; border-radius:4px; font-size:10px; font-weight:bold;">MOTION PREVIEW</div>
                    `;
                }
            }, 1500);
        }

        function generateAudio(prompt, id) {
            const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(prompt)}&tl=en&client=tw-ob`;
            setTimeout(() => {
                const container = document.querySelector(`#card-${id} .card-media`);
                if (container) {
                    container.innerHTML = `
                        <div style="text-align:center; width: 100%; padding: 20px;">
                            <div style="font-size:32px; margin-bottom:10px;">🔊</div>
                            <audio controls src="${url}"></audio>
                        </div>
                    `;
                }
            }, 800);
        }

        document.getElementById('clearBtn').addEventListener('click', () => {
            if(confirm('Are you sure you want to clear the workspace?')) {
                galleryGrid.innerHTML = '';
            }
        });
    </script>
</body>
</html>
