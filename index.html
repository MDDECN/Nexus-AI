<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="OIvgzp_QKd0d3xJcsX3grlRAuBjDDVz2oQJOUyKPocc" />
    <title>Nexus AI | Multimodal Creative Studio</title>
    
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2103/2103633.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #0d0d0f;
            color: #ffffff;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 260px;
            background-color: #151518;
            padding: 2rem 1.2rem;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #2a2a2e;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(90deg, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2.5rem;
            letter-spacing: -0.5px;
        }

        .menu-section {
            margin-bottom: 2rem;
        }

        .menu-label {
            font-size: 0.7rem;
            color: #52525b;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 1rem;
            display: block;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 0.8rem 1rem;
            color: #a1a1aa;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 0.4rem;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
            background: transparent;
            width: 100%;
            font-size: 0.9rem;
        }

        .menu-item:hover, .menu-item.active {
            background-color: #27272a;
            color: #ffffff;
        }

        .menu-item .icon {
            margin-right: 12px;
        }

        .btn-clear {
            margin-top: auto;
            background-color: transparent;
            border: 1px solid #3f3f46;
            color: #a1a1aa;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .btn-clear:hover {
            border-color: #ef4444;
            color: #ef4444;
        }

        .main-content {
            flex: 1;
            padding: 2.5rem;
            overflow-y: auto;
            background: radial-gradient(circle at top right, #1e1b4b 0%, #0d0d0f 45%);
        }

        header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #71717a;
            margin-bottom: 2rem;
        }

        .prompt-box {
            background-color: #18181b;
            border: 1px solid #27272a;
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 2.5rem;
        }

        textarea {
            width: 100%;
            height: 60px;
            background: transparent;
            border: none;
            color: #f4f4f5;
            font-size: 1rem;
            resize: none;
            outline: none;
        }

        .prompt-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #27272a;
            padding-top: 1rem;
            margin-top: 1rem;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        select {
            background-color: #27272a;
            color: white;
            border: 1px solid #3f3f46;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-magic {
            background: linear-gradient(135deg, #9333ea 0%, #db2777 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background-color: #18181b;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #27272a;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-media {
            aspect-ratio: 1/1;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .card-media img, .card-media video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-content {
            padding: 1rem;
        }

        .tag {
            font-size: 0.6rem;
            font-weight: 800;
            color: #a855f7;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card-desc {
            font-size: 0.85rem;
            color: #a1a1aa;
            margin-top: 4px;
        }

        .loader {
            width: 30px;
            height: 30px;
            border: 3px solid #3f3f46;
            border-top-color: #a855f7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        audio {
            width: 100%;
            height: 40px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">NEXUS AI</div>
        
        <nav class="menu-section">
            <span class="menu-label">Create</span>
            <button class="menu-item active" onclick="setMode('image')">
                <span class="icon">🖼️</span> Image Studio
            </button>
            <button class="menu-item" onclick="setMode('video')">
                <span class="icon">🎬</span> Video Motion
            </button>
            <button class="menu-item" onclick="setMode('audio')">
                <span class="icon">🎤</span> Voice & Audio
            </button>
        </nav>

        <button class="btn-clear" id="clearBtn">Reset Canvas</button>
    </aside>

    <main class="main-content">
        <header>
            <h1 id="mainTitle">AI Image Studio</h1>
            <p class="subtitle">Turn your imagination into digital reality.</p>
        </header>

        <div class="prompt-box">
            <textarea id="promptInput" placeholder="Describe what you want to create..."></textarea>
            <div class="prompt-footer">
                <div class="controls">
                    <select id="aspectRatio">
                        <option value="1024/1024">Square (1:1)</option>
                        <option value="1280/720">Wide (16:9)</option>
                        <option value="720/1280">Portrait (9:16)</option>
                    </select>
                </div>
                <button class="btn-magic" id="generateBtn">Generate</button>
            </div>
        </div>

        <div class="gallery" id="galleryGrid"></div>
    </main>

    <script>
        let currentMode = 'image';
        const galleryGrid = document.getElementById('galleryGrid');
        const promptInput = document.getElementById('promptInput');
        const generateBtn = document.getElementById('generateBtn');

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.menu-item').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            const titles = {
                image: "AI Image Studio",
                video: "AI Video Motion",
                audio: "AI Voice & Audio"
            };
            document.getElementById('mainTitle').innerText = titles[mode];
            promptInput.placeholder = `Describe your ${mode}...`;
        }

        generateBtn.addEventListener('click', () => {
            const prompt = promptInput.value.trim();
            if (!prompt) return alert('Enter a prompt first!');

            const id = Date.now();
            const ratio = document.getElementById('aspectRatio').value.split('/');
            const width = ratio[0];
            const height = ratio[1];

            const card = document.createElement('div');
            card.className = 'card';
            card.id = `card-${id}`;
            card.innerHTML = `
                <div class="card-media"><div class="loader"></div></div>
                <div class="card-content">
                    <span class="tag">${currentMode} generation</span>
                    <p class="card-desc">${prompt}</p>
                </div>
            `;
            galleryGrid.prepend(card);

            if (currentMode === 'image') {
                generateImage(prompt, width, height, id);
            } else if (currentMode === 'video') {
                generateVideo(prompt, id);
            } else {
                generateAudio(prompt, id);
            }
        });

        function generateImage(prompt, w, h, id) {
            const seed = Math.floor(Math.random() * 100000);
            const url = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=${w}&height=${h}&seed=${seed}&nologo=true`;
            
            const img = new Image();
            img.src = url;
            img.onload = () => {
                document.querySelector(`#card-${id} .card-media`).innerHTML = `<img src="${url}" alt="AI Gen">`;
            };
        }

        function generateVideo(prompt, id) {
            const url = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=480&height=480&model=turbo&feed=true`;
            setTimeout(() => {
                document.querySelector(`#card-${id} .card-media`).innerHTML = `
                    <img src="${url}" style="border-radius: 4px;" alt="AI Video Preview">
                    <div style="position:absolute; bottom:10px; right:10px; background:rgba(0,0,0,0.6); padding:2px 6px; border-radius:4px; font-size:10px;">GIF PREVIEW</div>
                `;
            }, 2000);
        }

        function generateAudio(prompt, id) {
            const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(prompt)}&tl=en&client=tw-ob`;
            
            setTimeout(() => {
                const mediaContainer = document.querySelector(`#card-${id} .card-media`);
                mediaContainer.innerHTML = `
                    <div style="text-align:center">
                        <span style="font-size:40px">🔊</span>
                        <audio controls src="${url}"></audio>
                    </div>
                `;
            }, 1000);
        }

        document.getElementById('clearBtn').addEventListener('click', () => {
            if(confirm('Clear your studio history?')) galleryGrid.innerHTML = '';
        });
    </script>
</body>
</html>
